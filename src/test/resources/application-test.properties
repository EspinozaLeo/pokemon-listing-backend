# H2 in-memory database — never touches real PostgreSQL
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate — create schema fresh, drop on shutdown
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Temp upload directory for tests
upload.directory=${java.io.tmpdir}/pokemon-test-uploads/

# Dummy credential paths — real calls are mocked, these just need to exist as properties
google.vision.credentials.path=dummy
openai.api.key.path=dummy
